org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Kotlin Daemon optimization
kotlin.incremental=false
kotlin.daemon.jvm.options=-Xmx2048m

# AndroidX and Jetifier
android.useAndroidX=true
android.enableJetifier=true

# Debug-specific optimizations
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
